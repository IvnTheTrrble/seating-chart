    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #000;
            padding-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-family: 'Great Vibes', cursive;
        }

        .header p {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.8px;
            color: #666;
            font-family: 'Playfair Display', serif;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid #000;
            background-color: #fff;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        input[type="text"]:focus {
            outline: none;
            box-shadow: inset 0 0 0 1px #000;
        }

        .clear-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            display: none;
        }

        .clear-btn.visible {
            display: block;
        }

        .clear-btn:hover {
            color: #000;
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #000;
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .result-item {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item:hover {
            background-color: #f5f5f5;
        }

        .result-item.selected {
            background-color: #f0f0f0;
            font-weight: 600;
        }

        .no-results {
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .result-display {
            display: none;
            text-align: center;
            margin-top: 40px;
            padding: 40px 20px;
            border: 1px solid #000;
            background-color: #fafafa;
        }

        .result-display.active {
            display: block;
        }

        .result-display h2 {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-family: 'Playfair Display', serif;
        }

        .table-number {
            font-size: 72px;
            font-weight: 400;
            letter-spacing: 2px;
            margin: 20px 0;
            line-height: 1;
            font-family: 'Playfair Display', serif;
        }

        .guest-name {
            font-size: 20px;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
        }

        .seating-info {
            font-size: 13px;
            color: #666;
            letter-spacing: 0.5px;
        }

        .reset-btn {
            background: #000;
            color: #fff;
            border: 1px solid #000;
            padding: 14px 30px;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 30px;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .reset-btn:hover {
            background-color: #333;
        }

        .tabs {
            display: none;
        }

        @media (max-width: 480px) {
            .header {
                margin-bottom: 30px;
                padding-bottom: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .table-number {
                font-size: 56px;
            }

            .result-display {
                padding: 30px 15px;
            }
        }
    </style>

        // DOM Elements
        const nameInput = document.getElementById('nameInput');
        const searchResults = document.getElementById('searchResults');
        const resultDisplay = document.getElementById('resultDisplay');
        const displayName = document.getElementById('displayName');
        const displayTable = document.getElementById('displayTable');
        const resetBtn = document.getElementById('resetBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Search functionality
        let currentResults = [];
        
        nameInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.trim().toLowerCase();
            clearBtn.classList.toggle('visible', searchTerm.length > 0);

            if (searchTerm.length === 0) {
                searchResults.classList.remove('active');
                currentResults = [];
                return;
            }

            // "Contains" search logic
            currentResults = guestData.filter(guest =>
                guest.name.toLowerCase().includes(searchTerm)
            );

            if (currentResults.length === 0) {
                searchResults.innerHTML = '<div class="no-results">No matches found</div>';
                searchResults.classList.add('active');
                return;
            }

            // Create result items
            searchResults.innerHTML = currentResults.map((guest, index) => 
                `<div class="result-item" data-index="${index}">${guest.name}</div>`
            ).join('');
            
            // Add click listeners to all result items
            document.querySelectorAll('.result-item').forEach((item) => {
                item.addEventListener('click', (event) => {
                    const index = parseInt(event.target.dataset.index);
                    const guest = currentResults[index];
                    selectGuest(guest.name, guest.table);
                });
            });
            
            searchResults.classList.add('active');
        });

        clearBtn.addEventListener('click', () => {
            nameInput.value = '';
            searchResults.classList.remove('active');
            clearBtn.classList.remove('visible');
            nameInput.focus();
        });

        function selectGuest(name, table) {
            displayName.textContent = name;
            displayTable.textContent = table;
            resultDisplay.classList.add('active');
            searchResults.classList.remove('active');
            nameInput.value = '';
            clearBtn.classList.remove('visible');
        }

        resetBtn.addEventListener('click', () => {
            resultDisplay.classList.remove('active');
            nameInput.value = '';
            clearBtn.classList.remove('visible');
            nameInput.focus();
        });

        // Focus input on page load
        window.addEventListener('load', () => {
            nameInput.focus();
        });
